services:

  alloy:
    image: grafana/alloy:v1.16.2    
    container_name: alloy
    pull_policy: never 
    restart: unless-stopped
    ports:
      - "514:514/udp"
      - "514:514/tcp"
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./alloy/data:/var/lib/alloy/data
    # Reporting disabled: stats.grafana.org is blocked by AdGuard (OISD Blocklist Big)	  
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      --storage.path=/var/lib/alloy/data
      --disable-reporting
      /etc/alloy/config.alloy
    environment:
      - TZ=Pacific/Honolulu
    networks:
      - loki-net

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    pull_policy: never 
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml
      - ./loki/data:/loki
    command: -config.file=/etc/loki/config.yml
    environment:
      - TZ=Pacific/Honolulu
    networks:
      - loki-net

  prometheus:
    image: prom/prometheus:v3.12.0
    user: "65534:65534"
    container_name: prometheus
    pull_policy: never 
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    environment:
      - TZ=Pacific/Honolulu
    networks:
      - loki-net

  unbound-exporter:
    build: ./unbound-exporter
    container_name: unbound-exporter
    restart: unless-stopped
    ports:
      - "9101:9101"
    environment:
      - TZ=Pacific/Honolulu
    networks:
      - loki-net

  grafana:
    image: grafana/grafana:13.0.2
    container_name: grafana
    pull_policy: never 
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana
    environment:
      - TZ=Pacific/Honolulu
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    networks:
      - loki-net

networks:
  loki-net:
    driver: bridge
